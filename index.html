<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyZone - SCP: SL Project</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Days+One&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: black;
            color: white;
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .font-days { font-family: 'Days One', sans-serif; }
        .banner-gradient { 
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0) 100%); 
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        
        .nav-btn-active { background-color: #f97316; color: white; }
        .nav-btn-inactive { color: #a1a1aa; }
        .nav-btn-inactive:hover { color: #f97316; }

        .rules-tab-active { border-left: 4px solid #f97316; background-color: rgba(249, 115, 22, 0.1); color: #fb923c; }
        .rules-tab-inactive { border-left: 4px solid #27272a; color: #71717a; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md border-b border-zinc-800 h-20 flex items-center justify-between px-6">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="showPage('home')">
            <img src="https://i.ibb.co/fYs0spL1/logo.png" alt="Logo" class="w-10 h-10 object-contain">
            <span class="font-days text-xl uppercase tracking-tighter">Candy<span class="text-orange-500">Zone</span></span>
        </div>
        
        <nav class="hidden md:flex space-x-2">
            <button onclick="showPage('home')" id="btn-home" class="nav-btn-active flex items-center space-x-2 px-4 py-2 rounded-lg transition-all font-days text-sm uppercase">
                <i data-lucide="home" class="w-4 h-4"></i><span>Главная</span>
            </button>
            <button onclick="showPage('rules')" id="btn-rules" class="nav-btn-inactive flex items-center space-x-2 px-4 py-2 rounded-lg transition-all font-days text-sm uppercase">
                <i data-lucide="book-open" class="w-4 h-4"></i><span>Правила</span>
            </button>
            <button onclick="showPage('plugins')" id="btn-plugins" class="nav-btn-inactive flex items-center space-x-2 px-4 py-2 rounded-lg transition-all font-days text-sm uppercase">
                <i data-lucide="toy-brick" class="w-4 h-4"></i><span>Плагины</span>
            </button>
        </nav>
        
        <button onclick="toggleMobileMenu()" class="md:hidden text-orange-500">
            <i data-lucide="menu" id="menu-icon"></i>
        </button>
    </header>

    <div id="mobile-menu" class="fixed inset-0 z-40 bg-black pt-24 px-6 hidden flex-col space-y-4">
        <button onclick="showPage('home')" class="text-zinc-400 font-days uppercase text-left py-4 border-b border-zinc-900">Главная</button>
        <button onclick="showPage('rules')" class="text-zinc-400 font-days uppercase text-left py-4 border-b border-zinc-900">Правила</button>
        <button onclick="showPage('plugins')" class="text-zinc-400 font-days uppercase text-left py-4 border-b border-zinc-900">Плагины</button>
    </div>

    <main class="pt-20 flex-grow" id="main-content"></main>

    <footer class="border-t border-zinc-900 py-10 bg-black mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <p class="text-zinc-500 font-days text-xs uppercase tracking-widest">© 2026 SCP: SL PROJECT</p>
                <p class="text-zinc-700 font-days text-[9px] uppercase mt-1 tracking-widest">Dev: Halloween (@banhalloween)</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4">
                <button onclick="copyIP()" class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl min-w-[200px] hover:border-orange-500 transition-all group">
                    <span class="block text-[10px] text-zinc-500 font-days uppercase mb-1">Server IP</span>
                    <div class="flex items-center justify-center space-x-2">
                        <span class="text-orange-500 font-days text-sm tracking-wide">193.164.16.158:7777</span>
                        <i data-lucide="copy" id="copy-status-icon" class="w-4 h-4 text-zinc-600"></i>
                    </div>
                </button>
                <a href="https://discord.gg/QGthvv8VFv" target="_blank" class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl min-w-[200px] hover:border-orange-500 transition-all flex flex-col items-center justify-center no-underline">
                    <span class="text-[10px] text-zinc-500 font-days uppercase mb-1 tracking-widest">Communication</span>
                    <div class="flex items-center space-x-2">
                        <img src="https://i.ibb.co/r22RSQkj/Discord.png" class="w-4 h-4" alt="DS">
                        <span class="text-zinc-300 font-days text-sm uppercase">Discord Сервер</span>
                    </div>
                </a>
            </div>
        </div>
    </footer>

    <script>
        const IP_ADDRESS = '193.164.16.158:7777';
        let currentPage = 'home';
        let currentTab = 'classic';

        const rulesDatabase = {
            classic: {
                title: "Правила Classic",
                items: [
                    { t: "[С1] Запрещено использовать баги.", p: "Блокировка 30 дней." },
                    { t: "[С2] Запрещено использование читов.", p: "Перманентная блокировка." },
                    { t: "[С3] Запрещены оскорбления.", p: "Мут/Бан 5 часов." },
                    { t: "[С4] Запрещен Soundpad.", p: "Мут 5 часов." },
                    { t: "[С5] Язык сервера — русский.", p: "Бан 100 дней." }
                ]
            },
            discord: {
                title: "Правила Discord",
                items: [
                    { t: "[D1] Запрещены оскорбления.", p: "Мут 12 часов." },
                    { t: "[D2] Запрещен спам.", p: "Мут 5 часов." }
                ]
            }
        };

        function copyIP() {
            const tempEl = document.createElement('textarea');
            tempEl.value = IP_ADDRESS;
            document.body.appendChild(tempEl);
            tempEl.select();
            document.execCommand('copy');
            document.body.removeChild(tempEl);
            const icon = document.getElementById('copy-status-icon');
            icon.style.color = '#22c55e';
            setTimeout(() => { icon.style.color = '#52525b'; }, 2000);
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
            document.getElementById('mobile-menu').classList.toggle('flex');
        }

        function showPage(page) {
            currentPage = page;
            document.getElementById('mobile-menu').classList.add('hidden');
            ['home', 'rules', 'plugins'].forEach(p => {
                const btn = document.getElementById('btn-' + p);
                if(btn) btn.className = (page === p ? 'nav-btn-active' : 'nav-btn-inactive') + " flex items-center space-x-2 px-4 py-2 rounded-lg transition-all font-days text-sm uppercase";
            });
            renderContent();
        }

        function setTab(tab) {
            currentTab = tab;
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            if (currentPage === 'home') {
                container.innerHTML = `<div class="h-[80vh] relative"><img src="https://i.ibb.co/S4Txc9HV/image.png" class="w-full h-full object-cover"><div class="absolute inset-0 banner-gradient"></div></div>`;
            } else if (currentPage === 'rules') {
                const data = rulesDatabase[currentTab];
                container.innerHTML = `<div class="max-w-7xl mx-auto px-6 py-12"><div class="relative rounded-3xl overflow-hidden h-48 md:h-64 mb-12 border border-zinc-800"><img src="https://i.ibb.co/kgp9QDH9/image.png" class="w-full h-full object-cover"><div class="absolute inset-0 banner-gradient"></div></div><div class="grid md:grid-cols-[280px_1fr] gap-10"><aside class="space-y-2"><button onclick="setTab('classic')" class="w-full flex items-center space-x-3 px-5 py-4 rounded-xl transition-all font-days text-xs uppercase ${currentTab === 'classic' ? 'rules-tab-active' : 'rules-tab-inactive'}">Classic</button><button onclick="setTab('discord')" class="w-full flex items-center space-x-3 px-5 py-4 rounded-xl transition-all font-days text-xs uppercase ${currentTab === 'discord' ? 'rules-tab-active' : 'rules-tab-inactive'}">Discord</button></aside><div class="bg-zinc-900/50 p-8 rounded-3xl border border-zinc-800"><h2 class="text-2xl font-days text-orange-500 mb-6 uppercase">${data.title}</h2><div class="space-y-4">${data.items.map(i => `<div class="border-b border-zinc-800/50 pb-4"><p class="text-zinc-200 font-bold mb-1">${i.t}</p><p class="text-orange-400 text-xs font-bold uppercase">Наказание: ${i.p}</p></div>`).join('')}</div></div></div></div>`;
            } else {
                container.innerHTML = `<div class="max-w-7xl mx-auto px-6 py-12"><div class="bg-zinc-900/50 p-20 rounded-3xl border border-zinc-800 text-center"><p class="font-days text-zinc-500 uppercase text-xs">В разработке</p></div></div>`;
            }
            lucide.createIcons();
            window.scrollTo(0,0);
        }
        window.onload = renderContent;
    </script>
</body>
</html>
